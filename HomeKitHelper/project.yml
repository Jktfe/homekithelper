name: HomeKitHelper
options:
  bundleIdPrefix: com.nmvc
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    SUPPORTS_MACCATALYST: "YES"
    DERIVE_MACCATALYST_PRODUCT_BUNDLE_IDENTIFIER: "NO"

targets:
  HomeKitHelper:
    type: application
    platform: iOS
    sources:
      - Sources
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nmvc.homekithelper
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/HomeKitHelper.entitlements
        SUPPORTS_MACCATALYST: "YES"
        TARGETED_DEVICE_FAMILY: "1,2,6"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Resources/HomeKitHelper.entitlements
      properties:
        com.apple.developer.homekit: true
